services:
  pi-agent:
    build: .
    container_name: pi-agent
    restart: unless-stopped
    shm_size: "1gb"
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /workspace
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - PI_TMUX_SESSION=${PI_TMUX_SESSION:-pi}
      - PI_WORKDIR=${PI_WORKDIR:-/workspace}
      - PI_TELEGRAM_AUTOCONNECT=${PI_TELEGRAM_AUTOCONNECT:-1}
      - PI_OLLAMA_ENABLED=${PI_OLLAMA_ENABLED:-1}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:26b-64k}
      - OLLAMA_MODELS=${OLLAMA_MODELS:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama}
      - OLLAMA_CONTEXT_WINDOW=${OLLAMA_CONTEXT_WINDOW:-128000}
      - OLLAMA_MAX_TOKENS=${OLLAMA_MAX_TOKENS:-4096}
      - OLLAMA_DISCOVERY_TIMEOUT_MS=${OLLAMA_DISCOVERY_TIMEOUT_MS:-1500}
      - FIRECRAWL_ENDPOINT=${FIRECRAWL_ENDPOINT:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AITUBO_API_KEY=${AITUBO_API_KEY:-}
      - RUNWAY_API_KEY=${RUNWAY_API_KEY:-}
    volumes:
      - ${PI_HOME_DIR:-./data/pi-home}:/home/node/.pi
      - ${PI_EXTENSIONS_DIR:-./extensions}:/home/node/.pi/agent/extensions:ro
      - ${PI_SKILLS_DIR:-./skills}:/home/node/.pi/agent/skills:ro
      - ${WORKSPACE_DIR:-./data/workspace}:/workspace
      - ${WORKTREES_DIR:-./data/worktrees}:/workspace/worktrees
      - ${WORKSPACE_AGENTS_DIR:-./data/workspace-agents}:/workspace/.agents
      - ${PI_SCHEDULER_DIR:-./scheduler}:/workspace/scheduler
      - ${PI_SSH_DIR:-./secrets/ssh}:/home/node/.ssh:ro
      - ${AGENTS_FILE:-./AGENTS.example.md}:/workspace/AGENTS.md:ro
      # Mount existing private repos with ignored docker-compose.override.yml; see docker-compose.override.example.yml.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tty: true
    stdin_open: true
